<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang TC", sans-serif;
  background: #1a1a1a; color: #1a1a1a;
  height: 100dvh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
.hdr {
  height: 50px; background: #222; border-bottom: 1px solid #444;
  display: flex; align-items: center; gap: 7px; padding: 0 12px;
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
}
.hdr h1 { font-size: 15px; font-weight: 700; flex-shrink: 0; color: #fff; }
.hdr label { font-size: 11px; color: #888; flex-shrink: 0; }
.hdr input[type="date"], .hdr select {
  height: 30px; border: 1px solid #444; border-radius: 7px;
  padding: 0 6px; font-size: 13px; background: #333; color: #fff;
  -webkit-appearance: none;
}
.hdr input[type="date"] { width: 126px; }
.hdr select { width: 70px; }
.hdr .sp { flex: 1; }
.hdr .badge { font-size: 12px; color: #aaa; flex-shrink: 0; }
/* Nav tabs（整合進 header） */
.nav-tab {
  height: 26px; padding: 0 11px; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer; color: #666;
  background: transparent; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.nav-tab.active { background: #007aff; color: #fff; }
/* 送出狀態 */
.submit-status { font-size: 11px; color: #34c759; flex-shrink: 0; white-space: nowrap; }
.layout {
  position: fixed; top: 50px; bottom: 50px; left: 0; right: 0;
  display: flex; flex-direction: row; overflow: hidden;
}
.map-area {
  flex: 1; min-width: 0; min-height: 0;
  overflow: hidden; background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
}
.drawer {
  width: 0; flex-shrink: 0; overflow: hidden; background: #fff;
  display: flex; flex-direction: column;
  transition: width 0.28s cubic-bezier(0.4,0,0.2,1);
}
.drawer.open { width: min(370px, 43vw); border-left: 1px solid #e0e0e0; }
.drw-hdr {
  height: 48px; flex-shrink: 0; display: flex; align-items: center;
  padding: 0 12px; border-bottom: 1px solid #f0f0f0; gap: 8px;
}
.drw-title { font-size: 15px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1a1a1a; }
.drw-prog { font-size: 12px; color: #888; flex-shrink: 0; }
.btn-close {
  width: 28px; height: 28px; border: none; background: #f0f0f0;
  border-radius: 50%; font-size: 17px; color: #555; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.drw-scroll { flex: 1; overflow-y: auto; padding: 10px; }
.cards-grid { display: flex; flex-direction: column; gap: 6px; }
.card {
  background: #f5f5f7; border-radius: 11px;
  border: 2px solid transparent; padding: 10px 12px;
  display: flex; flex-direction: row; align-items: center; gap: 10px;
}
.card.warn { border-color: #ff9500; background: #fff8f0; }
.card.done { border-color: #34c759; background: #f0fff5; }
.c-info { flex: 1; min-width: 0; }
.c-name { font-size: 13px; font-weight: 600; line-height: 1.35; color: #1a1a1a; }
.c-meta { font-size: 10px; color: #888; margin-top: 1px; display: flex; align-items: center; gap: 4px; }
.c-safe { color: #bbb; }
.c-safe.hi { color: #ff9500; font-weight: 600; }
.btn-stock { height: 32px; padding: 0 10px; border-radius: 8px; border: 1.5px solid #d0d0d0; background: #fff; font-size: 12px; font-weight: 600; color: #555; cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
.btn-stock.yes { background: #34c759; border-color: #34c759; color: #fff; }
.btn-stock.no  { background: #ff9500; border-color: #ff9500; color: #fff; }
.inp-row { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.btn-pm {
  width: 32px; height: 32px; flex-shrink: 0;
  border: 1px solid #d0d0d0; border-radius: 8px;
  background: #fff; font-size: 20px; line-height: 1; color: #333;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.c-inp {
  width: 56px; height: 32px; border: 1.5px solid #d0d0d0; border-radius: 8px;
  text-align: center; font-size: 15px; font-weight: 600;
  background: #fff; -webkit-appearance: none; color: #1a1a1a;
}
.c-inp:focus { outline: none; border-color: #007aff; }
.ftr {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: #222; border-top: 1px solid #444;
  display: flex; align-items: center; padding: 0 14px; z-index: 300;
}
.btn-submit {
  flex: 1; height: 38px; background: #007aff; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-submit:disabled { background: #3a5a8a; color: #aaa; }
.success {
  position: fixed; inset: 0; z-index: 999; background: #34c759;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; display: none;
}
.success.show { display: flex; }
.success .ico { font-size: 64px; }
.success .msg { font-size: 22px; font-weight: 700; color: #fff; }
.success .sub { font-size: 13px; color: rgba(255,255,255,0.85); text-align: center; padding: 0 28px; }
.btn-done {
  margin-top: 18px; padding: 11px 32px; background: #fff; color: #34c759;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
}
.zone-done .zbg { fill: rgba(52,199,89,0.7); stroke: #2ea84e; }
.zone-done .zlabel { fill: #1a4a20 !important; }
/* 新盤點按鈕 */
.btn-new-count { padding: 0 9px; height: 28px; background: #3a3a3a; border: 1px solid #555; border-radius: 7px; color: #aaa; font-size: 11px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-new-count:active { background: #555; }
/* 兩週/四週 模式 */
.mode-sw { display:flex; gap:0; background:#3a3a3a; border-radius:8px; padding:2px; flex-shrink:0; }
.mode-btn { height:26px; padding:0 11px; border:none; border-radius:6px; font-size:12px; font-weight:600; color:#888; background:transparent; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.mode-btn.active { background:#007aff; color:#fff; }
/* order 跳轉按鈕 */
.btn-order { margin-top:10px; padding: 11px 28px; background: #007aff; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
/* 數字鍵盤（嵌在抽屜底部） */
.drw-numpad {
  flex-shrink: 0; border-top: 1px solid #e8e8e8;
  background: #f0f0f5; padding: 8px 10px 10px; display: none;
}
.drw-numpad.show { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.np-btn {
  height: 38px; border: none; border-radius: 9px;
  font-size: 18px; font-weight: 600; color: #1a1a1a; cursor: pointer;
  background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.12);
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
}
.np-btn:active { background: #d8d8dc; }
.np-btn.np-bsp { background: #ffe0e0; color: #c0392b; font-size: 16px; }
.np-btn.np-ok  { background: #007aff; color: #fff; font-size: 14px; font-weight: 700; }
</style>
</head>

const LS_KEY  = "hc_counts_v5";
const LS_SUBMIT = "hc_last_submit";
let allItems = [], counts = {}, curZone = null;
let npActiveId = null, mode = '4w';

function showSubmitStatus(m) {
  const now = new Date();
  const mm = now.getMonth()+1, dd = now.getDate();
  const hh = String(now.getHours()).padStart(2,'0'), mi = String(now.getMinutes()).padStart(2,'0');
  const txt = `✓ ${mm}/${dd} ${hh}:${mi} ${m==='2w'?'兩週':'四週'}已送出`;
  localStorage.setItem(LS_SUBMIT, txt);
  const el = document.getElementById('submitStatus');
  if (el) el.textContent = txt;
}
function showToastMsg(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── 新盤點 ──
function startNew() {
  if (!confirm("確定要開始新盤點？目前已填的數量將全部清除。")) return;
  localStorage.removeItem(LS_SUBMIT);
  const el = document.getElementById('submitStatus'); if (el) el.textContent = '';
  counts = {};
  clearLocal();
  document.getElementById("datePicker").value = todayISO();
  refreshAll();
  if (curZone) { renderCards(zoneItems(curZone)); refreshProg(zoneItems(curZone)); }
  document.getElementById("successOv").classList.remove("show");
}

// ── 數字鍵盤 ──
function npFocus(id) {
  npActiveId = id;
  document.getElementById("numpad").classList.add("show");
}
function npClose() {
  document.getElementById("numpad").classList.remove("show");
  npActiveId = null;
}
function npSetVal(id, next) {
  const el = document.getElementById("inp-"+id);
  if (!el) return;
  el.removeAttribute("readonly");
  el.value = next;
  el.setAttribute("readonly", "");
  onInput(id, next);
}
function npInput(digit) {
  if (!npActiveId) return;
  const el = document.getElementById("inp-"+npActiveId);
  if (!el) return;
  const cur = el.value;
  const next = (cur === "0" || cur === "") ? digit : cur + digit;
  npSetVal(npActiveId, next);
}
function npBack() {
  if (!npActiveId) return;
  const el = document.getElementById("inp-"+npActiveId);
  if (!el) return;
  npSetVal(npActiveId, el.value.slice(0, -1));
}

function setMode(m) {
  if (mode === m) return;
  counts = {}; mode = m; npClose();
  document.getElementById('btn4w').classList.toggle('active', m === '4w');
  document.getElementById('btn2w').classList.toggle('active', m === '2w');
  document.getElementById('btnSubmit').textContent = m === '2w' ? '提交兩週盤點' : '提交本次盤點';
  saveLocal(); refreshAll();
  if (curZone) { renderCards(zoneItems(curZone)); refreshProg(zoneItems(curZone)); }
}
function set2w(id, val) {
  if (counts[id] === val) { delete counts[id]; } else { counts[id] = val; }
  saveLocal();
  if (curZone) {
    const it = zoneItems(curZone).find(i => i.id === id);
    if (it) { const c = document.getElementById('card-'+id); if (c) c.outerHTML = cardHTML(it); }
    refreshProg(zoneItems(curZone));
  }
  refreshAll();
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function toSD(iso) { const [,m,d] = iso.split("-"); return `${+m}/${+d}`; }
function saveLocal() { localStorage.setItem(LS_KEY, JSON.stringify({ date: document.getElementById("datePicker").value, counts, mode })); }
function loadLocal() { try { return JSON.parse(localStorage.getItem(LS_KEY) || "null"); } catch { return null; } }
function clearLocal() { localStorage.removeItem(LS_KEY); }

async function init() {
  const lastSubmit = localStorage.getItem(LS_SUBMIT);
  if (lastSubmit) { const el = document.getElementById('submitStatus'); if (el) el.textContent = lastSubmit; }
  const dp = document.getElementById("datePicker");
  dp.value = todayISO();
  const saved = loadLocal();
  const todayStr = todayISO();
  const isTodaySave = saved && saved.date === todayStr;
  if (isTodaySave) {
    counts = saved.counts || {};
    if (saved.mode && saved.mode !== mode) {
      mode = saved.mode;
      document.getElementById('btn4w').classList.toggle('active', mode === '4w');
      document.getElementById('btn2w').classList.toggle('active', mode === '2w');
      document.getElementById('btnSubmit').textContent = mode === '2w' ? '提交兩週盤點' : '提交本次盤點';
    }
  } else if (saved && saved.date !== todayStr) {
    clearLocal(); // 日期不同的舊資料直接清除
  }
  try {
    const [ir, cr] = await Promise.all([
      fetch(`${GAS_URL}?action=items`),
      fetch(`${GAS_URL}?action=latest-count&date=${encodeURIComponent(toSD(dp.value))}`)
    ]);
    const id = await ir.json(), cd = await cr.json();
    allItems = id.items || [];
    if (!isTodaySave && cd.counts) { counts = {}; for (const [k,v] of Object.entries(cd.counts)) counts[k] = String(v); }
  } catch(e) { console.warn("GAS init failed:", e); }
  refreshAll();
}

function openZone(name) {
  curZone = name;
  const items = zoneItems(name);
  document.getElementById("drwTitle").textContent = name;
  renderCards(items); refreshProg(items);
  document.getElementById("drawer").classList.add("open");
  document.querySelector(".drw-scroll").scrollTop = 0;
  refreshAll();
}
function closeZone() {
  document.getElementById("drawer").classList.remove("open");
  curZone = null; refreshAll();
}
function zoneItems(name) { return allItems.filter(it => it.zone === name); }

function renderCards(items) {
  const g = document.getElementById("cardsGrid");
  if (!items.length) {
    g.innerHTML = `<div style="padding:24px;text-align:center;color:#aaa;font-size:13px;line-height:1.9">此區尚無品項<br>請在 Sheets「存放區域」欄<br>填入「${curZone}」</div>`;
    return;
  }
  g.innerHTML = items.map(cardHTML).join("");
}
function cardHTML(it) {
  const ul = it.isBulk ? it.bulkUnit : it.unit;
  const ra = it.isBulk ? `<span style="font-size:9px;color:#bbb">(1${it.unit}=${it.ratio}${it.bulkUnit})</span>` : "";

  if (mode === '2w') {
    const v = counts[it.id];
    const isOk = v === '2w_ok', isNo = v === '2w_no';
    const ref2w = it.safety > 0 ? `· 安全量 ${it.safety}` : (it.baseline > 0 ? `· 目標 ${it.baseline}` : '');
    return `<div class="${isNo?'card warn':isOk?'card done':'card'}" id="card-${it.id}">
      <div class="c-info">
        <div class="c-name" title="${it.name}">${it.name}</div>
        <div class="c-meta"><span>${ul}</span>${ra}<span class="c-safe"> ${ref2w}</span></div>
      </div>
      <div class="inp-row">
        <button class="${isOk?'btn-stock yes':'btn-stock'}" ontouchstart="" onclick="set2w('${it.id}','2w_ok')">夠 ✓</button>
        <button class="${isNo?'btn-stock no':'btn-stock'}"  ontouchstart="" onclick="set2w('${it.id}','2w_no')">不夠 ✗</button>
      </div>
    </div>`;
  }

  // fixed 品項：兩種模式都用夠/不夠（不數實際量）
  if (it.fixed > 0) {
    const v = counts[it.id];
    const isOk = v === '2w_ok', isNo = v === '2w_no';
    return `<div class="${isNo?'card warn':isOk?'card done':'card'}" id="card-${it.id}">
      <div class="c-info">
        <div class="c-name" title="${it.name}">${it.name}</div>
        <div class="c-meta"><span>${ul}</span>${ra}<span class="c-safe"> · 目標 ${it.baseline}</span></div>
      </div>
      <div class="inp-row">
        <button class="${isOk?'btn-stock yes':'btn-stock'}" ontouchstart="" onclick="set2w('${it.id}','2w_ok')">夠 ✓</button>
        <button class="${isNo?'btn-stock no':'btn-stock'}"  ontouchstart="" onclick="set2w('${it.id}','2w_no')">不夠 ✗</button>
      </div>
    </div>`;
  }

  const v = counts[it.id] ?? "";
  const isStockMode = it.backupZone && !it.isBackup;
  const cls = v !== "" ? "card done" : "card";

  if (isStockMode) {
    const yesClass = v === "1" ? "btn-stock yes" : "btn-stock";
    const noClass  = v === "0" ? "btn-stock no"  : "btn-stock";
    return `<div class="${cls}" id="card-${it.id}">
      <div class="c-info">
        <div class="c-name" title="${it.name}">${it.name}</div>
        <div class="c-meta"><span>${ul}</span>${ra}<span style="color:#bbb"> · 有備存位置</span></div>
      </div>
      <div class="inp-row">
        <button class="${yesClass}" ontouchstart="" onclick="setStock('${it.id}','1')">已補齊</button>
        <button class="${noClass}"  ontouchstart="" onclick="setStock('${it.id}','0')">未補齊</button>
      </div>
    </div>`;
  }

  const num = v === "" ? null : +v;
  const w = it.safety > 0 && num !== null && num < it.safety;
  const clsW = w ? "card warn" : cls;
  const refStr = it.baseline > 0
    ? `<span class="c-safe"> · 基準量 ${it.baseline}</span>`
    : (it.safety > 0 ? `<span class="c-safe${w?" hi":""}"> · 安全量 ${it.safety}</span>` : "");
  return `<div class="${clsW}" id="card-${it.id}">
    <div class="c-info">
      <div class="c-name" title="${it.name}">${it.name}</div>
      <div class="c-meta"><span>${ul}</span>${ra}${refStr}</div>
    </div>
    <div class="inp-row">
      <button class="btn-pm" ontouchstart="" onclick="adj('${it.id}',-1)">−</button>
      <input class="c-inp" type="text" inputmode="none" min="0" id="inp-${it.id}" value="${v}" readonly onfocus="npFocus('${it.id}')" oninput="onInput('${it.id}',this.value)">
      <button class="btn-pm" ontouchstart="" onclick="adj('${it.id}',1)">+</button>
    </div>
  </div>`;
}
function setStock(id, val) {
  if (counts[id] === val) { delete counts[id]; }
  else { counts[id] = val; }
  saveLocal();
  const card = document.getElementById("card-"+id);
  if (card) {
    const items = zoneItems(curZone);
    const it = items.find(i => i.id === id);
    if (it) card.outerHTML = cardHTML(it);
  }
  refreshProg(zoneItems(curZone));
}
function adj(id, d) {
  const el = document.getElementById("inp-"+id); if (!el) return;
  const n = Math.max(0, (el.value===""?0:+el.value)+d);
  el.removeAttribute("readonly");
  el.value = n;
  el.setAttribute("readonly", "");
  onInput(id, String(n));
}
function onInput(id, raw) {
  raw = raw.trim();
  if (raw === "" || isNaN(+raw)) delete counts[id]; else counts[id] = raw;
  saveLocal();
  const it = allItems.find(i => i.id === id);
  if (it) {
    const num = raw===""?null:+raw, w = it.safety > 0 && num !== null && num < it.safety;
    const c = document.getElementById("card-"+id);
    if (c) { c.className = w ? "card warn" : raw !== "" ? "card done" : "card"; const s = c.querySelector(".c-safe"); if (s && !it.baseline) s.className = "c-safe"+(w?" hi":""); }
  }
  if (curZone) refreshProg(zoneItems(curZone));
}
function refreshProg(items) {
  const f = items.filter(it => counts[it.id] !== undefined).length;
  document.getElementById("drwProg").textContent = `${f}/${items.length}`;
}
function refreshAll() {
  const map = {};
  for (const it of allItems) { if (!it.zone) continue; (map[it.zone]=map[it.zone]||[]).push(it); }
  for (const [z, items] of Object.entries(map)) {
    const f = items.filter(it => counts[it.id] !== undefined).length;
    const done = items.length > 0 && f === items.length;
    for (const el of document.querySelectorAll(`[data-prog="${z}"]`)) el.textContent = `${f}/${items.length}`;
    for (const g of document.querySelectorAll(`[data-zone="${z}"]`)) g.classList.toggle("zone-done", done);
  }
  const all = allItems.filter(it => it.zone), tf = all.filter(it => counts[it.id] !== undefined).length;
  document.getElementById("totalBadge").textContent = `${tf}/${all.length}`;
}
document.getElementById("datePicker").addEventListener("change", async (e) => {
  counts = {};
  try {
    const r = await fetch(`${GAS_URL}?action=latest-count&date=${encodeURIComponent(toSD(e.target.value))}`);
    const d = await r.json();
    if (d.counts) for (const [k,v] of Object.entries(d.counts)) counts[k] = String(v);
  } catch {}
  saveLocal(); refreshAll();
  if (curZone) { renderCards(zoneItems(curZone)); refreshProg(zoneItems(curZone)); }
});
async function submitCount() {
  if (mode === '2w') { await submit2wOrder(); return; }
  const date = toSD(document.getElementById("datePicker").value);
  const countBy = document.getElementById("personPicker").value;
  const arr = [];
  for (const [id, v] of Object.entries(counts)) {
    const it = allItems.find(i => i.id === id);
    if (!it) continue;
    if (it.fixed > 0) {
      // 夠/不夠 轉成哨兵數字給 GAS：夠 = safety+1，不夠 = 0
      arr.push({id, value: v === '2w_ok' ? it.safety + 1 : 0});
    } else {
      const n = +v;
      if (!isNaN(n)) arr.push({id, value: n});
    }
  }
  if (!arr.length) { alert("請先填入盤點數量"); return; }
  const btn = document.getElementById("btnSubmit");
  btn.disabled = true; btn.textContent = "送出中…";
  try {
    const res = await fetch(GAS_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"count", date, countBy, counts:arr, submittedAt: new Date().toISOString()}) });
    const data = await res.json();
    if (data.ok) { clearLocal(); showSubmitStatus('4w'); showToastMsg('✅ 盤點已送出！前往②訂單確認'); }
    else alert("提交失敗：" + (data.error||"未知錯誤"));
  } catch(e) { alert("網路錯誤：" + e.message); }
  finally { btn.disabled = false; btn.textContent = "提交本次盤點"; }
}
async function submit2wOrder() {
  const seen = new Set(), noItems = [];
  for (const it of allItems) {
    if (counts[it.id] !== '2w_no') continue;
    const baseId = it.id.replace(/_(z1|z2|bk)$/, '');
    if (seen.has(baseId)) continue;
    seen.add(baseId);
    noItems.push({...it, id: baseId});
  }
  if (!noItems.length) { alert('所有品項都標記為「夠」，不需補貨！'); return; }
  const date = toSD(document.getElementById('datePicker').value);
  const sessionId = 'igo_' + Date.now();
  const items = noItems.map(it => {
    const qty = it.fixed > 0 ? it.fixed : (it.safety > 0 ? it.safety : it.baseline);
    return {
      id: it.id, name: it.name, unit: it.unit,
      channel: it.channel, igoName: it.igoName || it.name, igoSubName: it.igoSubName || '',
      lineTarget: it.lineTarget || '', suggested: qty, qty,
      current: null, warning: false, note: it.note || ''
    };
  });
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST', headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action: 'pending-order', sessionId, items, date})
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '未知錯誤');
    localStorage.setItem('igo_session_id', sessionId);
    clearLocal();
    showSubmitStatus('2w');
    showToastMsg(`✅ 兩週盤點送出！${noItems.length} 項需補貨，前往②訂單確認`);
  } catch(e) { alert('送出失敗：' + e.message); }
  finally { btn.disabled = false; btn.textContent = '提交兩週盤點'; }
}
init();
</script>
</body>
</html>
